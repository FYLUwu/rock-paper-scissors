<!DOCTYPE html>
<html lang="en">

<head>
    <script src="script.js"></script>
    <link rel="stylesheet" href="styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rps-web</title>
</head>

<body>
    <div class="focal-section">
        <div class="author-section"><strong>@Fyluwu</strong></div>
        <div class="game-section">
            <div class="title">
                <h1>Rock, Paper, Scissors</h1>
                <h2>Enter your choice below</h2>
            </div>
            <div class="answer-buttons">
                <button class="choice-button">Rock</button>
                <button class="choice-button">Paper</button>
                <button class="choice-button">Scissors</button>
            </div>
        </div>
    </div>
    <div class="result-section">
        <div class="result">
            <h2>Computer</h2>
            <p class="computer-result">0</p>
        </div>
        <div class="result">
            <h2>Human</h2>
            <p class="human-result">0</p>
        </div>
    </div>
</body>

</html>
